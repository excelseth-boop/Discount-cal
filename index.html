<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Discount Calculator</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: linear-gradient(135deg,#1c1c1e,#0a0a0c);
    color: #fff;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 20px) 12px;
  }
  h1 {
    font-size: 33px;
    font-weight: 700;
    text-align: center;
    margin: 8px 0 2px;
  }
  p.sub {
    text-align: center;
    color: #9b9ba1;
    font-size: 20px;
    margin: 0 0 8px;
  }
  .card {
    background: #1e1e22;
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid #2a2a2e;
  }
  label {
    display: block;
    font-size: 20px;
    color: #b0b0b6;
    margin-bottom: 4px;
  }
  input[type="number"] {
    width: 100%;
    font-size: 24px; /* prevents iOS zoom */
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #34343a;
    background: #2a2a2e;
    color: #fff;
    outline: none;
    min-width: 0;
  }
  input[type="number"]:focus { border-color: #0a84ff; }
  .discount-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 4px;
  }
  .discount-row input { flex: 1; min-width: 0; }
  .remove-btn {
    background: #3a2020;
    color: #ff6b6b;
    border: none;
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 10px;
    font-size: 27px;
    line-height: 1;
  }
  .add-btn, .coupon-add-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed #3d3d44;
    background: transparent;
    color: #0a84ff;
    font-size: 22px;
    font-weight: 600;
    margin-top: 0;
  }
  .calc-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #0a84ff;
    color: #fff;
    font-size: 25px;
    font-weight: 700;
    margin-top: 2px;
  }
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row .calc-btn { flex: 2; }
  .clear-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #3d3d44;
    background: #1e1e22;
    color: #ff6b6b;
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
  }
  .clear-btn:active { background: #2a2020; }
  .calc-btn:active { background: #0066cc; }
  .result {
    text-align: center;
    margin-top: 8px;
    padding: 16px 12px;
    border-radius: 16px;
    background: linear-gradient(135deg,#0a3a1e,#0a2a16);
    border: 1px solid #1e5c34;
    display: none;
  }
  .result.show { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .result .final {
    font-size: 54px;
    font-weight: 800;
    color: #4ee08a;
    margin: 4px 0 6px;
  }
  .result .saved {
    font-size: 21px;
    color: #9fd9b6;
  }
  .breakdown {
    margin-top: 10px;
    text-align: left;
    font-size: 20px;
    color: #b8e6c8;
    border-top: 1px solid #1e5c34;
    padding-top: 8px;
  }
  .breakdown div { padding: 3px 0; display: flex; justify-content: space-between; gap: 8px; }
  .section-title {
    font-size: 21px;
    font-weight: 700;
    color: #d0d0d6;
    margin-bottom: 8px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .toggle-row span.label-text {
    font-size: 20px;
    color: #e0e0e6;
    font-weight: 600;
  }
  .toggle-row span.hint {
    display: block;
    font-size: 16px;
    color: #888;
    font-weight: 400;
    margin-top: 2px;
  }
  .switch {
    position: relative;
    width: 54px;
    height: 32px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #3a3a40;
    border-radius: 32px;
    transition: 0.2s;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 26px;
    width: 26px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .switch input:checked + .slider { background-color: #0a84ff; }
  .switch input:checked + .slider:before { transform: translateX(22px); }
  .coupon-condition {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: -2px 0 4px 2px;
  }
  .coupon-condition input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #0a84ff;
  }
  .coupon-condition label {
    font-size: 16px;
    color: #8e8e93;
    margin: 0;
  }
</style>
</head>
<body>

<h1>Discount Calculator</h1>
<p class="sub">Multi-stage % discounts + flat coupon</p>

<div class="card">
  <div style="display:flex; gap:8px;">
    <div style="flex:2;">
      <label for="price">Product Price (USD)</label>
      <input type="number" id="price" inputmode="decimal" placeholder="e.g. 80" step="0.01">
    </div>
    <div style="flex:1;">
      <label for="itemsPerUnit">Items/Unit</label>
      <input type="number" id="itemsPerUnit" inputmode="numeric" placeholder="e.g. 4" step="1" min="1" max="99" value="1">
    </div>
  </div>
</div>

<div class="card">
  <div class="toggle-row">
    <span>
      <span class="label-text">Buy 1, Get 2nd at X% Off</span>
      <span class="hint">Calculates price for 2 items first</span>
    </span>
    <label class="switch">
      <input type="checkbox" id="buy2Toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="buy2PctRow" style="display:none; margin-top:6px;">
    <label for="buy2Pct">2nd item discount</label>
    <div class="discount-row" style="margin-bottom:0;">
      <input type="number" id="buy2Pct" inputmode="decimal" placeholder="e.g. 50" step="0.01" min="0" max="100" value="50">
      <span style="color:#888; font-size:20px; min-width:14px;">%</span>
    </div>
    <div class="coupon-condition" style="margin-top:8px;">
      <input type="checkbox" id="dualPriceToggle">
      <label for="dualPriceToggle">Two items have different prices (discount applies to cheaper one)</label>
    </div>
    <div id="secondPriceRow" style="display:none; margin-top:4px;">
      <label for="secondPrice">Price of 2nd item (USD)</label>
      <input type="number" id="secondPrice" inputmode="decimal" placeholder="e.g. 8" step="0.01">
    </div>
  </div>
</div>

<div class="card">
  <div class="section-title">Percentage Discounts</div>
  <div id="discountList"></div>
  <button class="add-btn" id="addDiscountBtn">+ Add Discount</button>
</div>

<div class="card">
  <div class="section-title">Flat Coupon Discounts (USD)</div>
  <div id="couponList"></div>
  <button class="coupon-add-btn" id="addCouponBtn">+ Add Coupon</button>
</div>

<div class="card">
  <div class="toggle-row">
    <span>
      <span class="label-text">Add VAT</span>
      <span class="hint">Applied after all discounts &amp; coupons</span>
    </span>
    <label class="switch">
      <input type="checkbox" id="vatToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="vatRateRow" style="display:none; margin-top:8px;">
    <label for="vatRate">VAT Rate</label>
    <div class="discount-row" style="margin-bottom:0;">
      <input type="number" id="vatRate" inputmode="decimal" placeholder="e.g. 6.25" step="0.01" min="0" max="100" value="6.25">
      <span style="color:#888; font-size:20px; min-width:14px;">%</span>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="clear-btn" id="clearBtn" type="button">Clear</button>
  <button class="calc-btn" id="calcBtn">Calculate Final Price</button>
</div>

<div class="result" id="result">
  <div class="saved">Final Price</div>
  <div class="final" id="finalPrice">$0.00</div>
  <div class="saved" id="totalSaved"></div>
  <div class="saved" id="perItemPrice" style="display:none; color:#4ee08a; font-weight:700; margin-top:4px;"></div>
  <div class="breakdown" id="breakdown"></div>
</div>

<script>
  var discountList = document.getElementById('discountList');
  var couponList = document.getElementById('couponList');

  function makeRow(placeholder, suffix) {
    var row = document.createElement('div');
    row.className = 'discount-row';

    var input = document.createElement('input');
    input.type = 'number';
    input.inputMode = 'decimal';
    input.step = '0.01';
    input.placeholder = placeholder;

    var suffixSpan = document.createElement('span');
    suffixSpan.textContent = suffix;
    suffixSpan.style.color = '#888';
    suffixSpan.style.fontSize = '20px';
    suffixSpan.style.minWidth = '14px';

    var removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '\u2212';
    removeBtn.type = 'button';
    removeBtn.addEventListener('click', function() {
      row.parentNode.removeChild(row);
    });

    row.appendChild(input);
    row.appendChild(suffixSpan);
    row.appendChild(removeBtn);
    return row;
  }

  var couponRowCount = 0;

  function makeCouponRow() {
    couponRowCount++;
    var checkboxId = 'couponCond' + couponRowCount;

    var wrapper = document.createElement('div');

    var row = makeRow('e.g. 3', '$');

    var condRow = document.createElement('div');
    condRow.className = 'coupon-condition';

    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.id = checkboxId;
    checkbox.className = 'coupon-2item-flag';

    var condLabel = document.createElement('label');
    condLabel.setAttribute('for', checkboxId);
    condLabel.textContent = 'Only valid when buying 2 items';

    condRow.appendChild(checkbox);
    condRow.appendChild(condLabel);

    wrapper.appendChild(row);
    wrapper.appendChild(condRow);

    var removeBtn = row.querySelector('.remove-btn');
    removeBtn.addEventListener('click', function() {
      wrapper.parentNode.removeChild(wrapper);
    });

    return wrapper;
  }

  function addDiscountRow() {
    discountList.appendChild(makeRow('e.g. 25', '%'));
  }

  function addCouponRow() {
    couponList.appendChild(makeCouponRow());
  }

  document.getElementById('addDiscountBtn').addEventListener('click', addDiscountRow);
  document.getElementById('addCouponBtn').addEventListener('click', addCouponRow);

  document.getElementById('buy2Toggle').addEventListener('change', function() {
    document.getElementById('buy2PctRow').style.display = this.checked ? 'block' : 'none';

    var itemsInput = document.getElementById('itemsPerUnit');
    var val = parseInt(itemsInput.value, 10);
    if (isNaN(val) || val < 1) val = 1;

    if (this.checked) {
      val = val * 2;
    } else {
      val = Math.round(val / 2);
    }
    if (val < 1) val = 1;
    if (val > 99) val = 99;

    itemsInput.value = val;
  });

  document.getElementById('dualPriceToggle').addEventListener('change', function() {
    document.getElementById('secondPriceRow').style.display = this.checked ? 'block' : 'none';
  });

  document.getElementById('vatToggle').addEventListener('change', function() {
    document.getElementById('vatRateRow').style.display = this.checked ? 'block' : 'none';
  });

  // Start with one discount row and one coupon row pre-added
  addDiscountRow();
  addCouponRow();

  document.getElementById('clearBtn').addEventListener('click', function() {
    document.getElementById('price').value = '';
    document.getElementById('price').style.borderColor = '#34343a';
    document.getElementById('itemsPerUnit').value = '1';

    document.getElementById('buy2Toggle').checked = false;
    document.getElementById('buy2Pct').value = '50';
    document.getElementById('buy2PctRow').style.display = 'none';
    document.getElementById('dualPriceToggle').checked = false;
    document.getElementById('secondPrice').value = '';
    document.getElementById('secondPriceRow').style.display = 'none';

    document.getElementById('vatToggle').checked = false;
    document.getElementById('vatRate').value = '6.25';
    document.getElementById('vatRateRow').style.display = 'none';

    discountList.innerHTML = '';
    couponList.innerHTML = '';
    addDiscountRow();
    addCouponRow();

    var resultEl = document.getElementById('result');
    resultEl.classList.remove('show');

    document.getElementById('price').focus();
  });

  document.getElementById('calcBtn').addEventListener('click', function() {
    var priceInput = document.getElementById('price');
    var price = parseFloat(priceInput.value);

    if (isNaN(price) || price <= 0) {
      priceInput.style.borderColor = '#ff453a';
      priceInput.focus();
      return;
    }
    priceInput.style.borderColor = '#34343a';

    var buy2 = document.getElementById('buy2Toggle').checked;
    var buy2Pct = parseFloat(document.getElementById('buy2Pct').value);
    if (isNaN(buy2Pct) || buy2Pct < 0) buy2Pct = 0;
    if (buy2Pct > 100) buy2Pct = 100;

    var dualPrice = document.getElementById('dualPriceToggle').checked;
    var secondPrice = parseFloat(document.getElementById('secondPrice').value);

    var current = price;
    var lines = [];
    lines.push({ label: 'Original Price', value: '$' + price.toFixed(2) });

    var buy2TotalBefore = price;

    if (buy2) {
      if (dualPrice && !isNaN(secondPrice) && secondPrice > 0) {
        var fullPriceItem = Math.max(price, secondPrice);
        var cheaperItem = Math.min(price, secondPrice);
        var discountedItem = cheaperItem * (1 - buy2Pct / 100);
        current = fullPriceItem + discountedItem;
        buy2TotalBefore = fullPriceItem + cheaperItem;
        lines.push({ label: 'Full price item', value: '$' + fullPriceItem.toFixed(2) });
        lines.push({ label: 'Cheaper item at ' + buy2Pct + '% off', value: '$' + discountedItem.toFixed(2) });
        lines.push({ label: 'Combined (2 items)', value: '$' + current.toFixed(2) });
      } else {
        var secondItem = price * (1 - buy2Pct / 100);
        current = price + secondItem;
        buy2TotalBefore = price * 2;
        lines.push({ label: '2nd item at ' + buy2Pct + '% off (+$' + secondItem.toFixed(2) + ')', value: '$' + current.toFixed(2) });
      }
    }

    var discInputs = discountList.querySelectorAll('input');
    for (var i = 0; i < discInputs.length; i++) {
      var pct = parseFloat(discInputs[i].value);
      if (!isNaN(pct) && pct > 0) {
        var reduceBy = current * (pct / 100);
        current = current - reduceBy;
        lines.push({ label: 'After ' + pct + '% off', value: '$' + current.toFixed(2) });
      }
    }

    var couponRows = couponList.children;
    for (var j = 0; j < couponRows.length; j++) {
      var couponInput = couponRows[j].querySelector('input[type="number"]');
      var couponFlag = couponRows[j].querySelector('.coupon-2item-flag');
      var amt = couponInput ? parseFloat(couponInput.value) : NaN;
      var requiresTwo = couponFlag ? couponFlag.checked : false;

      if (!isNaN(amt) && amt > 0) {
        if (requiresTwo && !buy2) {
          lines.push({ label: 'Coupon $' + amt.toFixed(2) + ' skipped (needs 2 items)', value: '\u2014' });
          continue;
        }
        current = current - amt;
        if (current < 0) current = 0;
        lines.push({ label: 'After $' + amt.toFixed(2) + ' coupon', value: '$' + current.toFixed(2) });
      }
    }

    var originalForPercent = buy2TotalBefore;
    var saved = originalForPercent - current;

    var preTaxPrice = current;
    var vatOn = document.getElementById('vatToggle').checked;
    var vatRate = parseFloat(document.getElementById('vatRate').value);
    if (isNaN(vatRate) || vatRate < 0) vatRate = 0;
    var vatAmount = preTaxPrice * (vatRate / 100);

    if (vatOn) {
      lines.push({ label: 'Price before VAT', value: '$' + preTaxPrice.toFixed(2) });
      lines.push({ label: 'VAT @' + vatRate + '%', value: '$' + vatAmount.toFixed(2) });
      current = preTaxPrice + vatAmount;
      lines.push({ label: 'Final price (incl. VAT)', value: '$' + current.toFixed(2) });
    }

    document.getElementById('finalPrice').textContent = '$' + current.toFixed(2);
    document.getElementById('totalSaved').textContent = 'You saved $' + saved.toFixed(2) + ' (' + ((saved / originalForPercent) * 100).toFixed(1) + '%)' + (vatOn ? ' \u2022 incl. VAT' : ' \u2022 excl. VAT');

    var itemsPerUnit = parseInt(document.getElementById('itemsPerUnit').value, 10);
    if (isNaN(itemsPerUnit) || itemsPerUnit < 1) itemsPerUnit = 1;
    if (itemsPerUnit > 99) itemsPerUnit = 99;

    var perItemEl = document.getElementById('perItemPrice');
    if (itemsPerUnit > 1) {
      var perItemVal = current / itemsPerUnit;
      perItemEl.textContent = 'Per item (1 of ' + itemsPerUnit + '): $' + perItemVal.toFixed(2);
      perItemEl.style.display = 'block';
    } else {
      perItemEl.style.display = 'none';
    }

    var breakdownEl = document.getElementById('breakdown');
    breakdownEl.innerHTML = '';
    for (var k = 0; k < lines.length; k++) {
      var d = document.createElement('div');
      var labelSpan = document.createElement('span');
      labelSpan.textContent = lines[k].label;
      var valSpan = document.createElement('span');
      valSpan.textContent = lines[k].value;
      d.appendChild(labelSpan);
      d.appendChild(valSpan);
      breakdownEl.appendChild(d);
    }

    var resultEl = document.getElementById('result');
    resultEl.classList.add('show');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js').catch(function(err) {
        console.log('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
